# pacsys MCP server configuration
#
# Usage:
#   python -m pacsys.mcp --config scripts/pacsys-mcp.toml
#
# Or via Claude Code:
#   claude --mcp-config scripts/.mcp_prod.json

[server]
transport = "stdio"
# port = 8000        # only used with transport = "sse"
# role = "testing"   # DPM role for access control
# audit_log = "pacsys-mcp-audit.jsonl"

[policies]
# Devices allowed for writing (glob patterns).
# Without this list, ALL writes are denied.
write_devices = ["Z:ACLTST"]

# Optional value range limits (per device glob pattern).
# Writes outside these bounds are rejected.
[policies.value_ranges]
"Z:ACLTST" = [0.0, 100.0]

# Optional slew rate limits (per device glob pattern).
# Prevents large jumps between consecutive writes.
[policies.slew_rates]
"Z:ACLTST" = { max_step = 5.0 }
# "Z:CUBE_Z" = { max_step = 10.0, max_rate = 2.0 }  # step AND rate limit
